<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{fragments/moderator-layout :: moderator-layout('Модерация — ruomi.fi', ~{::content})}">
    <th:block th:fragment="content">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="admin-card">
            <h2 class="mb-4"><i class="fas fa-shield-alt me-2"></i>Кабинет модератора</h2>
            <div class="admin-stat-grid">
                <div class="admin-stat">
                    <div class="value" th:text="${pendingCount}">0</div>
                    <div class="label">На модерации</div>
                </div>
                <div class="admin-stat" th:if="${searchSummary != null}">
                    <div class="value" th:text="${searchSummary.searchesToday()}">0</div>
                    <div class="label">Поисков сегодня</div>
                </div>
                <div class="admin-stat">
                    <div class="value" th:text="${#lists.size(topQueries)}">0</div>
                    <div class="label">Топ запросов</div>
                </div>
                <div class="admin-stat">
                    <div class="value" th:text="${#lists.size(zeroResultQueries)}">0</div>
                    <div class="label">Без результатов</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="admin-card h-100">
                    <h5 class="mb-3">Объявления на модерации</h5>
                    <div th:if="${#lists.isEmpty(pendingAdvertisements)}" class="text-muted">Нет объявлений для проверки</div>
                    <div th:each="ad : ${pendingAdvertisements}" class="border rounded p-3 mb-3" style="border-color:var(--glass-border)!important;">
                        <h6 th:text="${ad.title}">Заголовок</h6>
                        <p class="small text-muted mb-2" th:text="${#strings.abbreviate(ad.description, 120)}"></p>
                        <div class="d-flex flex-wrap gap-2">
                            <a th:href="@{/advertisement/{id}(id=${ad.id})}" class="btn btn-sm btn-outline-light border-secondary" target="_blank">Открыть</a>
                            <form th:action="@{/moderator/advertisement/{id}/approve(id=${ad.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <input type="hidden" name="comment" value="Одобрено модератором">
                                <button type="submit" class="btn btn-sm btn-primary">Одобрить</button>
                            </form>
                            <button type="button" class="btn btn-sm btn-danger" th:onclick="'showRejectModal(' + ${ad.id} + ')'">Отклонить</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-3">
                <div class="admin-card h-100">
                    <h5 class="mb-3">Топ запросов</h5>
                    <ul class="list-unstyled mb-0">
                        <li class="d-flex justify-content-between py-1 border-bottom" style="border-color:var(--glass-border)!important;" th:each="stat : ${topQueries}">
                            <span th:text="${stat.term()}">—</span>
                            <span class="badge bg-primary" th:text="${stat.count()}">0</span>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="col-lg-3">
                <div class="admin-card h-100">
                    <h5 class="mb-3">Без результатов</h5>
                    <ul class="list-unstyled mb-0">
                        <li class="py-1 border-bottom" style="border-color:var(--glass-border)!important;" th:each="log : ${zeroResultQueries}">
                            <div th:text="${log.term}">—</div>
                            <small class="text-muted" th:text="${#temporals.format(log.createdAt, 'dd.MM HH:mm')}"></small>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="admin-card mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Журнал модерации</h5>
                <a href="/moderator/analytics" class="btn btn-sm btn-primary">Аналитика</a>
            </div>
            <div class="table-responsive">
                <table class="table table-sm">
                    <thead><tr><th>Объявление</th><th>Действие</th><th>Модератор</th><th>Время</th></tr></thead>
                    <tbody>
                    <tr th:each="log : ${moderationLogs}">
                        <td><a th:href="@{/advertisement/{id}(id=${log.advertisement.id})}" th:text="${log.advertisement.title}"></a></td>
                        <td th:text="${log.action.getDisplayName()}"></td>
                        <td th:text="${log.moderator.username}"></td>
                        <td th:text="${#temporals.format(log.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="modal fade" id="rejectModal" tabindex="-1">
            <div class="modal-dialog"><div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Отклонить объявление</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <form id="rejectForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="modal-body"><textarea name="reason" class="form-control" rows="3" required placeholder="Причина"></textarea></div>
                    <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button><button type="submit" class="btn btn-danger">Отклонить</button></div>
                </form>
            </div></div>
        </div>
        <script>
            function showRejectModal(adId) {
                document.getElementById('rejectForm').action = '/moderator/advertisement/' + adId + '/reject';
                new bootstrap.Modal(document.getElementById('rejectModal')).show();
            }
        </script>
    </th:block>
</div>
</body>
</html>
