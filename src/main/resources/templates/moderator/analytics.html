<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика поиска - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Dynamic Theme CSS -->
    <link rel="stylesheet" th:href="@{/theme/css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand text-uppercase" href="/">ruomi.fi</a>
        <div class="collapse navbar-collapse">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/moderator/dashboard">Кабинет</a>
                <a class="nav-link" href="/" target="_blank">На сайт</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="nav-link border-0 bg-transparent text-white">Выйти</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-chart-line me-2"></i>Поисковая аналитика</h2>
        <a th:href="@{/moderator/analytics/export/csv}" class="btn btn-primary">
            <i class="fas fa-download me-1"></i>Экспорт CSV
        </a>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="mb-0">Топ поисковых запросов</h5>
                </div>
                <div class="card-body">
                    <canvas id="topQueriesChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="mb-0">Поиски по городам</h5>
                </div>
                <div class="card-body">
                    <canvas id="citiesChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="mb-0">Детальная статистика</h5>
                </div>
                <div class="card-body table-responsive">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>Запрос</th>
                            <th>Категория</th>
                            <th>Город</th>
                            <th>Найдено</th>
                            <th>Пользователь</th>
                            <th>Время</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="log : ${recentSearches}">
                            <td th:text="${log.term}">запрос</td>
                            <td th:text="${log.category}">категория</td>
                            <td th:text="${log.city}">город</td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${log.resultsCount == 0} ? 'bg-danger' : 'bg-success'"
                                      th:text="${log.resultsCount}">0</span>
                            </td>
                            <td th:text="${log.username ?: 'anonymous'}">anonymous</td>
                            <td th:text="${#temporals.format(log.createdAt, 'dd.MM.yyyy HH:mm')}">время</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Top Queries Chart
    const topQueriesData = /*[[${topQueries}]]*/ [];
    new Chart(document.getElementById('topQueriesChart'), {
        type: 'bar',
        data: {
            labels: topQueriesData.map(item => item.term),
            datasets: [{
                label: 'Количество запросов',
                data: topQueriesData.map(item => item.count),
                backgroundColor: 'rgba(54, 162, 235, 0.6)'
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    // Cities Chart (примерная реализация)
    const recentSearches = /*[[${recentSearches}]]*/ [];
    const cityCounts = {};
    recentSearches.forEach(log => {
        const city = log.city || 'Не указан';
        cityCounts[city] = (cityCounts[city] || 0) + 1;
    });
    
    new Chart(document.getElementById('citiesChart'), {
        type: 'doughnut',
        data: {
            labels: Object.keys(cityCounts),
            datasets: [{
                data: Object.values(cityCounts),
                backgroundColor: [
                    'rgba(255, 99, 132, 0.6)',
                    'rgba(54, 162, 235, 0.6)',
                    'rgba(255, 206, 86, 0.6)',
                    'rgba(75, 192, 192, 0.6)',
                    'rgba(153, 102, 255, 0.6)'
                ]
            }]
        },
        options: { responsive: true }
    });
</script>
</body>
</html>
