<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{fragments/moderator-layout :: moderator-layout('Аналитика поиска — ruomi.fi', ~{::content})}">
    <th:block th:fragment="content">
        <div class="admin-card">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                <h2 class="mb-0"><i class="fas fa-chart-line me-2"></i>Аналитика поиска</h2>
                <a th:href="@{/moderator/analytics/export/csv}" class="btn btn-primary btn-sm"><i class="fas fa-download me-1"></i>CSV</a>
            </div>
            <div class="admin-stat-grid" th:if="${summary != null}">
                <div class="admin-stat"><div class="value" th:text="${summary.totalSearches()}">0</div><div class="label">Всего поисков</div></div>
                <div class="admin-stat"><div class="value" th:text="${summary.searchesToday()}">0</div><div class="label">Сегодня</div></div>
                <div class="admin-stat"><div class="value" th:text="${summary.zeroResultCount()}">0</div><div class="label">Без результатов</div></div>
                <div class="admin-stat"><div class="value" th:text="${summary.uniqueUsers()}">0</div><div class="label">Уникальных пользователей</div></div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-lg-6">
                <div class="admin-card h-100">
                    <h5 class="mb-3">Топ запросов</h5>
                    <canvas id="topQueriesChart" height="200"></canvas>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="admin-card h-100">
                    <h5 class="mb-3">Поиски по городам</h5>
                    <canvas id="citiesChart" height="200"></canvas>
                </div>
            </div>
        </div>

        <div class="admin-card">
            <h5 class="mb-3">Последние поиски</h5>
            <div class="table-responsive">
                <table class="table table-sm">
                    <thead><tr><th>Запрос</th><th>Категория</th><th>Город</th><th>Найдено</th><th>Пользователь</th><th>Время</th></tr></thead>
                    <tbody>
                    <tr th:each="log : ${recentSearches}">
                        <td th:text="${log.term}"></td>
                        <td th:text="${log.category}"></td>
                        <td th:text="${log.city}"></td>
                        <td><span class="badge" th:classappend="${log.resultsCount == 0} ? 'bg-danger' : 'bg-success'" th:text="${log.resultsCount}"></span></td>
                        <td th:text="${log.username ?: 'anonymous'}"></td>
                        <td th:text="${#temporals.format(log.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script th:inline="javascript">
            const topQueries = /*[[${topQueries}]]*/ [];
            const topCities = /*[[${topCities}]]*/ [];
            new Chart(document.getElementById('topQueriesChart'), {
                type: 'bar',
                data: {
                    labels: topQueries.map(i => i.term),
                    datasets: [{ label: 'Запросы', data: topQueries.map(i => i.count), backgroundColor: 'rgba(124, 58, 237, 0.7)' }]
                },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
            new Chart(document.getElementById('citiesChart'), {
                type: 'doughnut',
                data: {
                    labels: topCities.map(i => i.term),
                    datasets: [{ data: topCities.map(i => i.count), backgroundColor: ['#7C3AED','#A855F7','#EC4899','#C084FC','#8B5CF6'] }]
                },
                options: { responsive: true }
            });
        </script>
    </th:block>
</div>
</body>
</html>
