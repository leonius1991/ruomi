<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал модерации - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Dynamic Theme CSS -->
    <link rel="stylesheet" th:href="@{/theme/css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand text-uppercase" href="/">ruomi.fi</a>
        <div class="collapse navbar-collapse">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/moderator/dashboard">Кабинет</a>
                <a class="nav-link" href="/" target="_blank">На сайт</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="nav-link border-0 bg-transparent text-white">Выйти</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container my-4">
    <h2 class="mb-4">
        <i class="fas fa-history me-2"></i>Журнал модерации
        <span th:if="${advertisement != null}">
            для объявления: <span th:text="${advertisement.title}">Заголовок</span>
        </span>
    </h2>
    
    <div class="card shadow-sm">
        <div class="card-body table-responsive">
            <table class="table">
                <thead>
                <tr>
                    <th>Дата</th>
                    <th>Действие</th>
                    <th>Модератор</th>
                    <th>Комментарий</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="log : ${logs}">
                    <td th:text="${#temporals.format(log.createdAt, 'dd.MM.yyyy HH:mm')}">Дата</td>
                    <td>
                        <span class="badge" 
                              th:classappend="${log.action.name() == 'APPROVED'} ? 'bg-success' : 
                                              (${log.action.name() == 'REJECTED'} ? 'bg-danger' : 'bg-secondary')"
                              th:text="${log.action.getDisplayName()}">Действие</span>
                    </td>
                    <td th:text="${log.moderator.username}">Модератор</td>
                    <td th:text="${log.comment ?: '-'}">Комментарий</td>
                </tr>
                <tr th:if="${#lists.isEmpty(logs)}">
                    <td colspan="4" class="text-center text-muted">Журнал пуст</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="mt-3">
        <a href="/moderator/dashboard" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-1"></i>Назад
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
