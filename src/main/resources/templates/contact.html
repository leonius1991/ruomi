<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head-common :: viewport}"></th:block>
    <title>Контакты - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Dynamic Theme CSS -->
    <link rel="stylesheet" th:href="@{/theme/css}">
</head>
<body>

    <div th:replace="~{fragments/navbar :: nav}"></div>

    <div class="container my-5">
        <h1 class="mb-4">Контакты</h1>

            <div class="col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5><i class="fas fa-envelope me-2"></i>Email</h5>
                        <p>info@ruomi.fi</p>
                        <h5><i class="fab fa-telegram me-2"></i>Telegram</h5>
                        <p>@ruomi_fi_bot</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <div th:replace="~{fragments/site-footer :: visit-stats}"></div>
