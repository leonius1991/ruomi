<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head-common :: viewport}"></th:block>
    <title>Личные сообщения - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/theme/css}">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: nav}"></div>
    
    <!-- Notification Bar -->
    <div th:replace="~{fragments/notifications :: notification-bar}"></div>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="fas fa-envelope me-2"></i>Личные сообщения</h4>
                    </div>
                    <div class="card-body">
                        <div th:if="${unreadCount > 0}" class="alert alert-info">
                            У вас <strong th:text="${unreadCount}">0</strong> непрочитанных сообщений
                        </div>
                        
                        <div th:if="${partners.isEmpty()}" class="alert alert-info">
                            У вас пока нет сообщений.
                        </div>
                        
                        <div class="list-group" th:if="${!partners.isEmpty()}">
                            <a th:href="@{/messages/conversation/{id}(id=${partner.id})}" 
                               class="list-group-item list-group-item-action"
                               th:each="partner : ${partners}">
                                <div class="d-flex w-100 justify-content-between">
                                    <h6 class="mb-1" th:text="${partner.firstName + ' ' + partner.lastName}">Имя</h6>
                                    <small th:text="${partner.username}">@username</small>
                                </div>
                                <p class="mb-1 text-muted">Нажмите, чтобы открыть диалог</p>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <div th:replace="~{fragments/site-footer :: visit-stats}"></div>
</body>
</html>
