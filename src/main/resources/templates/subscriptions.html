<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head-common :: viewport}"></th:block>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" content="X-CSRF-TOKEN"/>
    <title>Мои подписки - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/theme/css}">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: nav}"></div>
    
    <!-- Notification Bar -->
    <div th:replace="~{fragments/notifications :: notification-bar}"></div>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="fas fa-bell me-2"></i>Мои подписки на категории</h4>
                    </div>
                    <div class="card-body">
                        <p class="text-muted">Подпишитесь на категории, чтобы получать уведомления о новых объявлениях в Telegram.</p>
                        
                        <div class="row mt-4">
                            <div class="col-md-6">
                                <h5>Активные подписки</h5>
                                <div th:if="${subscriptions.isEmpty()}" class="alert alert-info">
                                    У вас пока нет активных подписок.
                                </div>
                                <div class="list-group" th:if="${!subscriptions.isEmpty()}">
                                    <div class="list-group-item d-flex justify-content-between align-items-center" 
                                         th:each="sub : ${subscriptions}">
                                        <div>
                                            <strong th:text="${sub.category.displayName}">Категория</strong>
                                            <br>
                                            <small class="text-muted" th:text="${'Подписано: ' + #temporals.format(sub.subscribedAt, 'dd.MM.yyyy')}">Дата</small>
                                        </div>
                                        <button class="btn btn-sm btn-outline-danger" 
                                                th:onclick="'unsubscribe(' + ${sub.category.id} + ')'">
                                            <i class="fas fa-times"></i> Отписаться
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <h5>Доступные категории</h5>
                                <div class="list-group">
                                    <div class="list-group-item d-flex justify-content-between align-items-center" 
                                         th:each="cat : ${categories}">
                                        <span th:text="${cat.displayName}">Категория</span>
                                        <button class="btn btn-sm btn-primary" 
                                                th:onclick="'subscribe(' + ${cat.id} + ')'"
                                                th:disabled="${#lists.contains(subscriptions.![category.id], cat.id)}">
                                            <i class="fas fa-plus"></i> Подписаться
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Получить CSRF токен
        function getCsrfToken() {
            return document.querySelector('meta[name="_csrf"]')?.getAttribute('content') || '';
        }
        
        function subscribe(categoryId) {
            const csrfToken = getCsrfToken();
            fetch('/subscriptions/subscribe?categoryId=' + categoryId, {
                method: 'POST',
                headers: {
                    'X-CSRF-TOKEN': csrfToken,
                    'Content-Type': 'application/x-www-form-urlencoded'
                }
            })
                .then(response => response.text())
                .then(data => {
                    if (data === 'success') {
                        location.reload();
                    } else {
                        alert('Ошибка: ' + data);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Ошибка при подписке');
                });
        }
        
        function unsubscribe(categoryId) {
            if (confirm('Вы уверены, что хотите отписаться?')) {
                const csrfToken = getCsrfToken();
                fetch('/subscriptions/unsubscribe?categoryId=' + categoryId, {
                    method: 'POST',
                    headers: {
                        'X-CSRF-TOKEN': csrfToken,
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                })
                    .then(response => response.text())
                    .then(data => {
                        if (data === 'success') {
                            location.reload();
                        } else {
                            alert('Ошибка: ' + data);
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Ошибка при отписке');
                    });
            }
        }
    </script>

    <div th:replace="~{fragments/site-footer :: visit-stats}"></div>
</body>
</html>
