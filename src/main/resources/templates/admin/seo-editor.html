<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:replace="~{fragments/admin-layout :: admin-layout('SEO-редактор - ruomi.fi', ~{::content})}">
        <th:block th:fragment="content">
            <div class="admin-card">
                <h2 class="mb-4"><i class="fas fa-search me-2"></i>SEO-редактор</h2>
                
                <div class="row">
                    <div class="col-lg-8">
                        <div class="card shadow-sm">
                            <div class="card-header">
                                <h5 class="mb-0">Редактировать метаданные</h5>
                            </div>
                            <div class="card-body">
                                <form th:action="@{/admin/seo}" method="post">
                                    <div class="mb-3">
                                        <label class="form-label">Ключ страницы (pageKey)</label>
                                        <input type="text" name="pageKey" class="form-control" 
                                               placeholder="home, category:JOBS, search" required>
                                        <small class="text-muted">Примеры: home, category:JOBS, search</small>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Заголовок (Title)</label>
                                        <input type="text" name="title" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Описание (Description)</label>
                                        <textarea name="description" class="form-control" rows="3"></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Ключевые слова (Keywords)</label>
                                        <input type="text" name="keywords" class="form-control" 
                                               placeholder="ключевое слово 1, ключевое слово 2">
                                    </div>
                                    <input type="hidden" name="id" value="">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save me-1"></i>Сохранить
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="card shadow-sm">
                            <div class="card-header">
                                <h5 class="mb-0">Предпросмотр сниппета</h5>
                            </div>
                            <div class="card-body">
                                <div class="search-result-preview">
                                    <div class="preview-title text-primary mb-1" id="previewTitle">Заголовок страницы</div>
                                    <div class="preview-url text-success small mb-1">https://ruomi.fi/...</div>
                                    <div class="preview-description text-muted small" id="previewDescription">
                                        Описание страницы для поисковых систем...
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mt-4">
                    <div class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-header">
                                <h5 class="mb-0">Существующие метаданные</h5>
                            </div>
                            <div class="card-body table-responsive">
                                <table class="table">
                                    <thead>
                                    <tr>
                                        <th>Ключ</th>
                                        <th>Заголовок</th>
                                        <th>Описание</th>
                                        <th>Действия</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="meta : ${metadataList}">
                                        <td th:text="${meta.pageKey}">pageKey</td>
                                        <td th:text="${meta.title}">Title</td>
                                        <td th:text="${#strings.abbreviate(meta.description, 50)}">Description</td>
                                        <td>
                                            <button class="btn btn-sm btn-primary" 
                                                    th:onclick="'editMeta(' + ${meta.id} + ')'">
                                                <i class="fas fa-edit"></i>
                                            </button>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </th:block>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('input[name="title"]').addEventListener('input', function() {
            document.getElementById('previewTitle').textContent = this.value || 'Заголовок страницы';
        });
        document.querySelector('textarea[name="description"]').addEventListener('input', function() {
            document.getElementById('previewDescription').textContent = this.value || 'Описание страницы...';
        });
    </script>
</body>
</html>
