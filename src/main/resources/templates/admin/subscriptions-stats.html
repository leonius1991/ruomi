<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:replace="~{fragments/admin-layout :: admin-layout('Статистика подписок - ruomi.fi', ~{::content})}">
        <th:block th:fragment="content">
            <div class="admin-card">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="fas fa-bell me-2"></i>Статистика подписок</h4>
                    </div>
                    <div class="card-body">
                        <div class="row mb-4">
                            <div class="col-md-12">
                                <div class="alert alert-info">
                                    <h5>Всего подписок: <strong th:text="${totalSubscriptions}">0</strong></h5>
                                </div>
                            </div>
                        </div>
                        
                        <h5 class="mb-3">Подписки по категориям:</h5>
                        <div class="table-responsive">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>Категория</th>
                                        <th>Количество подписок</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="entry : ${categoryStats}">
                                        <td th:text="${entry.key.displayName}">Категория</td>
                                        <td th:text="${entry.value}">0</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </th:block>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
