<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:replace="~{fragments/admin-layout :: admin-layout('Управление пользователями - ruomi.fi', ~{::content})}">
        <th:block th:fragment="content">
            <div class="admin-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-users me-2"></i>Управление пользователями</h2>
                </div>
                
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <form method="get" action="/admin/users" class="row g-3">
                            <div class="col-md-10">
                                <input type="text" name="search" class="form-control" 
                                       th:value="${search}" placeholder="Поиск по имени, email...">
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-search"></i> Поиск
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <div class="card shadow-sm">
                    <div class="card-body table-responsive">
                        <table class="table table-hover">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Имя пользователя</th>
                                <th>Email</th>
                                <th>Имя</th>
                                <th>Роль</th>
                                <th>Статус</th>
                                <th>Премиум</th>
                                <th>Дата регистрации</th>
                                <th>Действия</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users.content}">
                                <td th:text="${user.id}">1</td>
                                <td th:text="${user.username}">username</td>
                                <td th:text="${user.email}">email</td>
                                <td th:text="${user.firstName + ' ' + user.lastName}">Имя</td>
                                <td>
                                    <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post" class="d-inline">
                                        <select name="role" class="form-select form-select-sm" 
                                                th:value="${user.role.name()}"
                                                onchange="this.form.submit()">
                                            <option th:each="role : ${roles}" 
                                                    th:value="${role.name()}" 
                                                    th:text="${role.name()}">
                                            </option>
                                        </select>
                                    </form>
                                </td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${user.enabled} ? 'bg-success' : 'bg-danger'"
                                          th:text="${user.enabled ? 'Активен' : 'Неактивен'}">
                                    </span>
                                    <form th:action="@{/admin/users/{id}/enable(id=${user.id})}" method="post" class="d-inline ms-2">
                                        <input type="hidden" name="enabled" th:value="${!user.enabled}">
                                        <button type="submit" class="btn btn-sm btn-outline-secondary">
                                            <i th:classappend="${user.enabled} ? 'fas fa-ban' : 'fas fa-check'"></i>
                                        </button>
                                    </form>
                                </td>
                                <td>
                                    <form th:action="@{/admin/users/{id}/premium(id=${user.id})}" method="post" class="d-inline">
                                        <input type="hidden" name="isPremium" th:value="${user.role.name() != 'PREMIUM'}">
                                        <button type="submit" class="btn btn-sm" 
                                                th:classappend="${user.role.name() == 'PREMIUM'} ? 'btn-warning' : 'btn-outline-warning'">
                                            <i class="fas fa-star"></i>
                                        </button>
                                    </form>
                                </td>
                                <td th:text="${#temporals.format(user.createdAt, 'dd.MM.yyyy')}">Дата</td>
                                <td>
                                    <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" 
                                          class="d-inline"
                                          onsubmit="return confirm('Вы уверены, что хотите удалить этого пользователя?')">
                                        <button type="submit" class="btn btn-sm btn-danger">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                        
                        <!-- Pagination -->
                        <nav th:if="${totalPages > 1}">
                            <ul class="pagination justify-content-center">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/users(page=${currentPage - 1}, search=${search})}">
                                        <i class="fas fa-chevron-left"></i>
                                    </a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                                    th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link" th:href="@{/admin/users(page=${i}, search=${search})}" 
                                       th:text="${i + 1}">1</a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/users(page=${currentPage + 1}, search=${search})}">
                                        <i class="fas fa-chevron-right"></i>
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </th:block>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
