<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|${banner.id != null ? 'Редактировать баннер' : 'Создать баннер'} - ruomi.fi|">Создать баннер - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/theme/css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand text-uppercase" href="/">ruomi.fi</a>
        <div class="collapse navbar-collapse">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/admin/banners">Баннеры</a>
                <a class="nav-link" href="/" target="_blank">На сайт</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="nav-link border-0 bg-transparent text-white">Выйти</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container my-4">
    <h2 class="mb-4" th:text="${banner.id != null ? 'Редактировать баннер' : 'Создать баннер'}">Создать баннер</h2>
    
    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="${banner.id != null ? '/admin/banners/' + banner.id + '/edit' : '/admin/banners/create'}" 
                          th:object="${banner}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label class="form-label">Название</label>
                            <input type="text" class="form-control" th:field="*{title}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Описание</label>
                            <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">URL изображения</label>
                            <input type="url" class="form-control" th:field="*{imageUrl}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Ссылка (URL)</label>
                            <input type="url" class="form-control" th:field="*{linkUrl}">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Позиция</label>
                            <select class="form-select" th:field="*{position}" required>
                                <option value="TOP">Вверху страницы</option>
                                <option value="SIDEBAR">Боковая панель</option>
                                <option value="BOTTOM">Внизу страницы</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{active}">
                                <label class="form-check-label">Активен</label>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Дата начала</label>
                                <input type="datetime-local" class="form-control" name="startDate"
                                       th:value="${banner.startDate != null ? #temporals.format(banner.startDate, 'yyyy-MM-dd\'T\'HH:mm') : ''}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Дата окончания</label>
                                <input type="datetime-local" class="form-control" name="endDate"
                                       th:value="${banner.endDate != null ? #temporals.format(banner.endDate, 'yyyy-MM-dd\'T\'HH:mm') : ''}">
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/admin/banners" class="btn btn-secondary">Отмена</a>
                            <button type="submit" class="btn btn-primary">Сохранить</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
