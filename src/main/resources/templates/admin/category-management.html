<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление категориями - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/theme/css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand text-uppercase" href="/">ruomi.fi</a>
        <div class="collapse navbar-collapse">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/admin/seo">SEO-редактор</a>
                <a class="nav-link" href="/admin/theme">Редактор темы</a>
                <a class="nav-link" href="/admin/users">Пользователи</a>
                <a class="nav-link" href="/admin/banners">Баннеры</a>
                <a class="nav-link active" href="/admin/categories">Категории</a>
                <a class="nav-link" href="/moderator/dashboard">Кабинет</a>
                <a class="nav-link" href="/" target="_blank">На сайт</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="nav-link border-0 bg-transparent text-white">Выйти</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container my-4">
    <h2 class="mb-4"><i class="fas fa-list me-2"></i>Управление категориями</h2>
    
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <!-- Categories Section -->
    <div class="card shadow-sm mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Категории</h5>
            <button type="button" class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#categoryModal" onclick="openCategoryModal(null)">
                <i class="fas fa-plus me-1"></i>Добавить категорию
            </button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Отображаемое имя</th>
                        <th>Иконка</th>
                        <th>Порядок</th>
                        <th>Активна</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cat : ${categories}">
                        <td th:text="${cat.id}">1</td>
                        <td th:text="${cat.name}">Название</td>
                        <td th:text="${cat.displayName}">Отображаемое имя</td>
                        <td><i th:class="'fas ' + ${cat.icon}"></i></td>
                        <td th:text="${cat.sortOrder}">0</td>
                        <td>
                            <span class="badge" th:classappend="${cat.active} ? 'bg-success' : 'bg-danger'"
                                  th:text="${cat.active ? 'Да' : 'Нет'}">
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="openCategoryModal([[${cat.id}]])">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-info" onclick="showSubcategories([[${cat.id}]])">
                                <i class="fas fa-list"></i> Подкатегории
                            </button>
                            <button class="btn btn-sm btn-warning" onclick="showTypes([[${cat.id}]])">
                                <i class="fas fa-tags"></i> Типы
                            </button>
                            <form th:action="@{/admin/categories/category/{id}/delete(id=${cat.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Удалить категорию?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-danger">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Category Modal -->
<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Категория</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="categoryForm" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="modal-body">
                    <input type="hidden" id="categoryId" name="id">
                    <div class="mb-3">
                        <label class="form-label">Название (латиница, уникальное)</label>
                        <input type="text" class="form-control" id="categoryName" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Отображаемое имя</label>
                        <input type="text" class="form-control" id="categoryDisplayName" name="displayName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Иконка (Font Awesome, например: fa-house)</label>
                        <input type="text" class="form-control" id="categoryIcon" name="icon">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Порядок сортировки</label>
                        <input type="number" class="form-control" id="categorySortOrder" name="sortOrder" value="0">
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="categoryActive" name="active" checked>
                            <label class="form-check-label">Активна</label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function openCategoryModal(id) {
        const form = document.getElementById('categoryForm');
        if (id) {
            // Load category data and set update action
            form.action = '/admin/categories/category/' + id + '/update';
            // TODO: Load category data via AJAX
        } else {
            form.action = '/admin/categories/category/create';
            form.reset();
            document.getElementById('categoryId').value = '';
        }
    }
    
    function showSubcategories(categoryId) {
        // TODO: Show subcategories modal
        alert('Подкатегории для категории ' + categoryId);
    }
    
    function showTypes(categoryId) {
        // TODO: Show types modal
        alert('Типы для категории ' + categoryId);
    }
</script>
</body>
</html>
