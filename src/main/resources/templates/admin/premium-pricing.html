<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цены премиум размещений - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/theme/css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand text-uppercase" href="/">ruomi.fi</a>
        <div class="collapse navbar-collapse">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/admin/seo">SEO-редактор</a>
                <a class="nav-link" href="/admin/theme">Редактор темы</a>
                <a class="nav-link" href="/admin/users">Пользователи</a>
                <a class="nav-link active" href="/admin/premium-pricing">Цены премиум</a>
                <a class="nav-link" href="/admin/banners">Баннеры</a>
                <a class="nav-link" href="/moderator/dashboard">Кабинет</a>
                <a class="nav-link" href="/" target="_blank">На сайт</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="nav-link border-0 bg-transparent text-white">Выйти</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container my-4">
    <h2 class="mb-4"><i class="fas fa-euro-sign me-2"></i>Цены премиум размещений</h2>
    
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/admin/premium-pricing}" th:object="${pricing}" method="post">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">7 дней</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" th:field="*{days7}" readonly>
                                    <span class="input-group-text">€</span>
                                    <input type="number" step="0.01" class="form-control" th:field="*{price7}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">14 дней</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" th:field="*{days14}" readonly>
                                    <span class="input-group-text">€</span>
                                    <input type="number" step="0.01" class="form-control" th:field="*{price14}">
                                </div>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">30 дней</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" th:field="*{days30}" readonly>
                                    <span class="input-group-text">€</span>
                                    <input type="number" step="0.01" class="form-control" th:field="*{price30}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">60 дней</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" th:field="*{days60}" readonly>
                                    <span class="input-group-text">€</span>
                                    <input type="number" step="0.01" class="form-control" th:field="*{price60}">
                                </div>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">90 дней</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" th:field="*{days90}" readonly>
                                    <span class="input-group-text">€</span>
                                    <input type="number" step="0.01" class="form-control" th:field="*{price90}">
                                </div>
                            </div>
                        </div>
                        
                        <input type="hidden" th:field="*{id}">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Сохранить цены
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
