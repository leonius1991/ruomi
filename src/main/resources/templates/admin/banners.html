<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:replace="~{fragments/admin-layout :: admin-layout('Управление баннерами - ruomi.fi', ~{::content})}">
        <th:block th:fragment="content">
            <div class="admin-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-image me-2"></i>Управление баннерами</h2>
                    <a href="/admin/banners/create" class="btn btn-primary">
                        <i class="fas fa-plus me-1"></i>Создать баннер
                    </a>
                </div>
                
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div class="card shadow-sm">
                    <div class="card-body table-responsive">
                        <table class="table table-hover">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Название</th>
                                <th>Изображение</th>
                                <th>Позиция</th>
                                <th>Активен</th>
                                <th>Просмотры</th>
                                <th>Клики</th>
                                <th>Действия</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="banner : ${banners}">
                                <td th:text="${banner.id}">1</td>
                                <td th:text="${banner.title}">Название</td>
                                <td>
                                    <img th:src="${banner.imageUrl}" style="max-width: 100px; max-height: 50px; object-fit: cover;" th:alt="${banner.title}">
                                </td>
                                <td th:text="${banner.position}">TOP</td>
                                <td>
                                    <span class="badge" th:classappend="${banner.isActive} ? 'bg-success' : 'bg-danger'"
                                          th:text="${banner.isActive ? 'Да' : 'Нет'}">
                                    </span>
                                </td>
                                <td th:text="${banner.views}">0</td>
                                <td th:text="${banner.clicks}">0</td>
                                <td>
                                    <a th:href="@{/admin/banners/{id}/edit(id=${banner.id})}" class="btn btn-sm btn-primary">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <form th:action="@{/admin/banners/{id}/delete(id=${banner.id})}" method="post" class="d-inline"
                                          onsubmit="return confirm('Удалить баннер?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-danger">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </th:block>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
