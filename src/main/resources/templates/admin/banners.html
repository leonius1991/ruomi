<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление баннерами - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/theme/css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand text-uppercase" href="/">ruomi.fi</a>
        <div class="collapse navbar-collapse">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/admin/seo">SEO-редактор</a>
                <a class="nav-link" href="/admin/theme">Редактор темы</a>
                <a class="nav-link" href="/admin/users">Пользователи</a>
                <a class="nav-link" href="/admin/premium-pricing">Цены премиум</a>
                <a class="nav-link active" href="/admin/banners">Баннеры</a>
                <a class="nav-link" href="/moderator/dashboard">Кабинет</a>
                <a class="nav-link" href="/" target="_blank">На сайт</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="nav-link border-0 bg-transparent text-white">Выйти</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-image me-2"></i>Управление баннерами</h2>
        <a href="/admin/banners/create" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i>Создать баннер
        </a>
    </div>
    
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <div class="card shadow-sm">
        <div class="card-body table-responsive">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Изображение</th>
                    <th>Позиция</th>
                    <th>Активен</th>
                    <th>Просмотры</th>
                    <th>Клики</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="banner : ${banners}">
                    <td th:text="${banner.id}">1</td>
                    <td th:text="${banner.title}">Название</td>
                    <td>
                        <img th:src="${banner.imageUrl}" style="max-width: 100px; max-height: 50px; object-fit: cover;" th:alt="${banner.title}">
                    </td>
                    <td th:text="${banner.position}">TOP</td>
                    <td>
                        <span class="badge" th:classappend="${banner.isActive} ? 'bg-success' : 'bg-danger'"
                              th:text="${banner.isActive ? 'Да' : 'Нет'}">
                        </span>
                    </td>
                    <td th:text="${banner.views}">0</td>
                    <td th:text="${banner.clicks}">0</td>
                    <td>
                        <a th:href="@{/admin/banners/{id}/edit(id=${banner.id})}" class="btn btn-sm btn-primary">
                            <i class="fas fa-edit"></i>
                        </a>
                        <form th:action="@{/admin/banners/{id}/delete(id=${banner.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Удалить баннер?')">
                            <button type="submit" class="btn btn-sm btn-danger">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
