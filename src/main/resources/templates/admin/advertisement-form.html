<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{fragments/admin-layout :: admin-layout('Редактирование объявления — ruomi.fi', ~{::content})}">
    <th:block th:fragment="content">
        <div class="admin-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0"><i class="fas fa-edit me-2"></i>Редактирование #<span th:text="${adDto.id}">1</span></h2>
                <a href="/admin/advertisements" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i>Назад</a>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/admin/advertisements/{id}(id=${adDto.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Заголовок</label>
                        <input type="text" name="title" class="form-control" th:value="${adDto.title}" required maxlength="200">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Автор</label>
                        <select name="userId" class="form-select" required>
                            <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.username + ' (' + u.email + ')'}"
                                    th:selected="${u.id == adDto.userId}"></option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Описание</label>
                        <textarea name="description" class="form-control" rows="8" required maxlength="5000" th:text="${adDto.description}"></textarea>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Категория</label>
                        <select name="category" class="form-select" required id="adminCat">
                            <option th:each="c : ${categories}" th:value="${c.name()}" th:text="${c.displayName}"
                                    th:selected="${c.name() == adDto.category}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Подкатегория</label>
                        <select name="subcategoryId" class="form-select">
                            <option value="">— не выбрана —</option>
                            <option th:each="s : ${subcategories}" th:value="${s.id}" th:text="${s.name}"
                                    th:selected="${s.id == adDto.subcategoryId}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Тип</label>
                        <select name="type" class="form-select">
                            <option th:each="t : ${types}" th:value="${t.name()}" th:text="${t.displayName}"
                                    th:selected="${t.name() == adDto.type}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Цена (€)</label>
                        <input type="number" step="0.01" name="price" class="form-control" th:value="${adDto.price}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Город / область / район</label>
                        <input type="text" id="cityInput" name="city" class="form-control" th:value="${adDto.city}" autocomplete="off">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Адрес / район (текст)</label>
                        <input type="text" name="location" class="form-control" th:value="${adDto.location}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Статус</label>
                        <select name="status" class="form-select">
                            <option th:each="st : ${statuses}" th:value="${st.name()}" th:text="${st.name()}"
                                    th:selected="${st.name() == adDto.status}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <input type="hidden" name="premium" value="false"/>
                        <input type="hidden" name="urgent" value="false"/>
                        <input type="hidden" name="showPhone" value="false"/>
                        <div class="form-check mt-4">
                            <input type="checkbox" name="premium" value="true" class="form-check-input" id="premium"
                                   th:checked="${adDto.premium}">
                            <label class="form-check-label" for="premium">Премиум</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" name="urgent" value="true" class="form-check-input" id="urgent"
                                   th:checked="${adDto.urgent}">
                            <label class="form-check-label" for="urgent">Срочное</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" name="showPhone" value="true" class="form-check-input" id="showPhone"
                                   th:checked="${adDto.showPhone}">
                            <label class="form-check-label" for="showPhone">Показывать телефон</label>
                        </div>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Сохранить</button>
                    <a th:href="@{/advertisement/{id}(id=${adDto.id})}" class="btn btn-outline-teal" target="_blank">Открыть на сайте</a>
                </div>
            </form>
        </div>
        <script th:src="@{/js/finnish-locations.js}"></script>
        <script>document.addEventListener('DOMContentLoaded', () => FinnishLocations.initAutocomplete('cityInput'));</script>
    </th:block>
</div>
</body>
</html>
