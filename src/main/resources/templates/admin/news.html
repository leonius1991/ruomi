<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{fragments/admin-layout :: admin-layout('Новости — ruomi.fi', ~{::content})}">
    <th:block th:fragment="content">
        <div class="admin-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0"><i class="fas fa-newspaper me-2"></i>Новости сайта</h2>
                <a href="/admin/news/create" class="btn btn-primary btn-sm"><i class="fas fa-plus me-1"></i>Добавить</a>
            </div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div class="table-responsive">
                <table class="table">
                    <thead><tr><th>Заголовок</th><th>Опубликована</th><th>Дата</th><th></th></tr></thead>
                    <tbody>
                    <tr th:each="item : ${newsList}">
                        <td>
                            <strong th:text="${item.title}">—</strong>
                            <div class="small text-muted" th:text="${item.summary}"></div>
                        </td>
                        <td><span class="badge" th:classappend="${item.published} ? 'bg-success' : 'bg-secondary'" th:text="${item.published ? 'Да' : 'Нет'}"></span></td>
                        <td th:text="${#temporals.format(item.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
                        <td class="text-end">
                            <a th:href="@{/admin/news/{id}/edit(id=${item.id})}" class="btn btn-sm btn-primary"><i class="fas fa-edit"></i></a>
                            <form th:action="@{/admin/news/{id}/delete(id=${item.id})}" method="post" class="d-inline" onsubmit="return confirm('Удалить новость?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block>
</div>
</body>
</html>
