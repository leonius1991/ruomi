<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:replace="~{fragments/admin-layout :: admin-layout('Админ панель - ruomi.fi', ~{::content})}">
        <th:block th:fragment="content">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="admin-card">
                <h1 class="mb-4"><i class="fas fa-tachometer-alt me-2"></i>Админ панель</h1>

                <div class="admin-stat-grid">
                    <div class="admin-stat">
                        <div class="value" th:text="${totalUsers}">0</div>
                        <div class="label">Пользователей</div>
                    </div>
                    <div class="admin-stat">
                        <div class="value" th:text="${activeAdvertisements}">0</div>
                        <div class="label">Активных объявлений</div>
                    </div>
                    <div class="admin-stat">
                        <div class="value" th:text="${pendingAdvertisements}">0</div>
                        <div class="label">На модерации</div>
                    </div>
                    <div class="admin-stat">
                        <div class="value" th:text="${totalReports}">0</div>
                        <div class="label">Жалоб</div>
                    </div>
                </div>

                <div class="admin-card mb-0">
                    <h3 class="mb-3">Настройки импорта</h3>
                    <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
                        <span>Doska.fi парсер:</span>
                        <form th:if="${doskaImportEnabled}" th:action="@{/admin/settings/doska-import}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="enabled" value="false"/>
                            <button type="submit" class="btn btn-sm btn-warning">Отключить парсинг</button>
                        </form>
                        <form th:if="${!doskaImportEnabled}" th:action="@{/admin/settings/doska-import}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="enabled" value="true"/>
                            <button type="submit" class="btn btn-sm btn-success">Включить парсинг</button>
                        </form>
                        <span class="small text-muted" th:text="${doskaImportEnabled ? 'Активен (ежедневно ~04:00)' : 'Отключён'}"></span>
                    </div>
                    <h3 class="mb-3">Быстрые действия</h3>
                    <div class="d-flex flex-wrap gap-2">
                        <a href="/admin/users" class="btn btn-primary">
                            <i class="fas fa-users me-2"></i>Пользователи
                        </a>
                        <a href="/admin/categories" class="btn btn-primary">
                            <i class="fas fa-list me-2"></i>Категории
                        </a>
                        <a href="/moderator/dashboard" class="btn btn-outline-light border-secondary">
                            <i class="fas fa-shield-alt me-2"></i>Модерация
                        </a>
                        <a href="/admin/updates" class="btn btn-outline-light border-secondary">
                            <i class="fas fa-sync-alt me-2"></i>Обновления
                        </a>
                        <form action="/admin/import-doska" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-outline-light border-secondary">
                                <i class="fas fa-download me-2"></i>Импорт с doska.fi
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </th:block>
    </div>
</body>
</html>
