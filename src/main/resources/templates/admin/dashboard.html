<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:replace="~{fragments/admin-layout :: admin-layout('Админ панель - ruomi.fi', ~{::content})}">
        <th:block th:fragment="content">
            <div class="admin-card">
                <h1 class="mb-4">Админ панель</h1>
                
                <div class="row">
                    <div class="col-md-3">
                        <div class="stat-card" style="background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); color: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem;">
                            <h3 class="mb-0" th:text="${totalUsers}">0</h3>
                            <p class="mb-0">Всего пользователей</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card success" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem;">
                            <h3 class="mb-0" th:text="${activeAdvertisements}">0</h3>
                            <p class="mb-0">Активных объявлений</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card warning" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem;">
                            <h3 class="mb-0" th:text="${pendingAdvertisements}">0</h3>
                            <p class="mb-0">На модерации</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card danger" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem;">
                            <h3 class="mb-0" th:text="${totalReports}">0</h3>
                            <p class="mb-0">Жалоб</p>
                        </div>
                    </div>
                </div>
                
                <div class="admin-card">
                    <h3>Быстрые действия</h3>
                    <div class="d-grid gap-2 d-md-flex">
                        <a href="/admin/users" class="btn btn-primary">
                            <i class="fas fa-users me-2"></i>Управление пользователями
                        </a>
                        <a href="/moderator/dashboard" class="btn btn-warning">
                            <i class="fas fa-shield-alt me-2"></i>Модерация объявлений
                        </a>
                        <a href="/admin/updates" class="btn btn-info">
                            <i class="fas fa-sync-alt me-2"></i>Проверить обновления
                        </a>
                    </div>
                </div>
            </div>
        </th:block>
    </div>
</body>
</html>
