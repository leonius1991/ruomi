<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рассылки в Telegram - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/theme/css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: nav}"></div>
    
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="fas fa-bullhorn me-2"></i>История рассылок</h4>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Дата создания</th>
                                        <th>Статус</th>
                                        <th>Получателей</th>
                                        <th>Успешно</th>
                                        <th>Ошибок</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="broadcast : ${broadcasts}">
                                        <td th:text="${#temporals.format(broadcast.createdAt, 'dd.MM.yyyy HH:mm')}">Дата</td>
                                        <td>
                                            <span class="badge" th:classappend="${broadcast.sent} ? 'bg-success' : 'bg-warning'"
                                                  th:text="${broadcast.sent} ? 'Отправлено' : 'В очереди'">Статус</span>
                                        </td>
                                        <td th:text="${broadcast.totalRecipients}">0</td>
                                        <td th:text="${broadcast.successfulSends}">0</td>
                                        <td th:text="${broadcast.failedSends}">0</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0"><i class="fas fa-plus me-2"></i>Создать рассылку</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/broadcasts/create}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="mb-3">
                                <label class="form-label">Текст сообщения</label>
                                <textarea class="form-control" name="content" rows="8" required 
                                          placeholder="Введите текст рассылки..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-success w-100">
                                <i class="fas fa-paper-plane me-2"></i>Отправить всем пользователям
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
