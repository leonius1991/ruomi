<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:replace="~{fragments/admin-layout :: admin-layout('Рассылки в Telegram - ruomi.fi', ~{::content})}">
        <th:block th:fragment="content">
            <div class="admin-card">
                <div class="row">
                    <div class="col-md-8">
                        <div class="card mb-4">
                            <div class="card-header bg-primary text-white">
                                <h4 class="mb-0"><i class="fas fa-bullhorn me-2"></i>История рассылок</h4>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table">
                                        <thead>
                                            <tr>
                                                <th>Дата</th>
                                                <th>Текст</th>
                                                <th>Статус</th>
                                                <th>Получателей</th>
                                                <th>Действия</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="broadcast : ${broadcasts}">
                                                <td th:text="${#temporals.format(broadcast.createdAt, 'dd.MM.yyyy HH:mm')}">Дата</td>
                                                <td th:text="${#strings.abbreviate(broadcast.content, 80)}">Текст</td>
                                                <td>
                                                    <span class="badge" th:classappend="${broadcast.sent} ? 'bg-success' : 'bg-warning'"
                                                          th:text="${broadcast.sent} ? 'Отправлено' : 'Черновик'">Статус</span>
                                                </td>
                                                <td th:text="${broadcast.totalRecipients}">0</td>
                                                <td>
                                                    <form th:if="${!broadcast.sent}" th:action="@{/admin/broadcasts/{id}/delete(id=${broadcast.id})}" method="post" class="d-inline" onsubmit="return confirm('Удалить?')">
                                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                        <button type="submit" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                                                    </form>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header bg-success text-white">
                                <h5 class="mb-0"><i class="fas fa-plus me-2"></i>Создать рассылку</h5>
                            </div>
                            <div class="card-body">
                                <form th:action="@{/admin/broadcasts/create}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <div class="mb-3">
                                        <label class="form-label">Текст сообщения</label>
                                        <textarea class="form-control" name="content" rows="8" required 
                                                  placeholder="Введите текст рассылки..."></textarea>
                                    </div>
                                    <button type="submit" class="btn btn-success w-100">
                                        <i class="fas fa-paper-plane me-2"></i>Отправить всем пользователям
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </th:block>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
