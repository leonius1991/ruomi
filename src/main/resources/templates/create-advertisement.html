<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать объявление - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/theme/css}">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <div th:replace="~{fragments/navbar :: nav}"></div>
    
    <!-- Notification Bar -->
    <div th:replace="~{fragments/notifications :: notification-bar}"></div>

    <div class="container my-4" style="max-width: 900px;">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Создать объявление</h4>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <span th:text="${success}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <form th:action="@{/create-advertisement}" th:object="${advertisementDto}" method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label class="form-label">Заголовок <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{title}" required>
                                <div th:if="${#fields.hasErrors('title')}" class="text-danger">
                                    <span th:errors="*{title}"></span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Описание <span class="text-danger">*</span></label>
                                <div id="description-editor" style="min-height: 200px;"></div>
                                <textarea id="description-hidden" name="description" th:field="*{description}" style="display:none;" required></textarea>
                                <div th:if="${#fields.hasErrors('description')}" class="text-danger">
                                    <span th:errors="*{description}"></span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Фотографии (максимум 10)</label>
                                <input type="file" class="form-control" name="images" multiple accept="image/*" id="imageInput">
                                <div id="imagePreview" class="mt-3 d-flex flex-wrap gap-2"></div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Категория <span class="text-danger">*</span></label>
                                    <select class="form-select" id="categorySelect" th:field="*{category}" required>
                                        <option value="">Выберите категорию</option>
                                        <option th:each="cat : ${categories}" 
                                                th:value="${cat.name()}" 
                                                th:text="${cat.getDisplayName()}">
                                        </option>
                                    </select>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Тип объявления</label>
                                    <select class="form-select" id="advertisementType" name="type" th:field="*{type}">
                                        <option value="">Выберите тип</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Цена (€)</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{price}" min="0">
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Город</label>
                                    <div class="autocomplete">
                                        <input type="text" id="cityInput" class="form-control" th:field="*{city}" placeholder="Начните вводить название города...">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Адрес/Местоположение</label>
                                <input type="text" class="form-control" th:field="*{location}">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Премиум размещение</label>
                                <select class="form-select" id="premiumDays" name="premiumDays">
                                    <option value="0">Без премиум</option>
                                    <option value="7">7 дней - €5.00</option>
                                    <option value="14">14 дней - €9.00</option>
                                    <option value="30">30 дней - €15.00</option>
                                    <option value="60">60 дней - €25.00</option>
                                    <option value="90">90 дней - €35.00</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" th:field="*{urgent}">
                                    <label class="form-check-label">
                                        Срочное объявление
                                    </label>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/advertisements" class="btn btn-secondary">Отмена</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-paper-plane me-1"></i>Отправить на модерацию
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h5 class="mb-0">Полезная информация</h5>
                    </div>
                    <div class="card-body">
                        <p class="small text-muted">
                            После создания объявление будет отправлено на модерацию. 
                            После одобрения оно появится на сайте.
                        </p>
                        <p class="small text-muted">
                            Премиум объявления отображаются вверху списка и получают больше просмотров.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/cities-autocomplete.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initCityAutocomplete('cityInput');
            
            // Dynamic type selection based on category
            const categorySelect = document.getElementById('categorySelect');
            const typeSelect = document.getElementById('advertisementType');
            
            if (categorySelect && typeSelect) {
                function updateTypes() {
                    const category = categorySelect.value;
                    typeSelect.innerHTML = '<option value="">Выберите тип</option>';
                    
                    if (category === 'JOBS') {
                        typeSelect.innerHTML += `
                            <optgroup label="Направление">
                                <option value="JOB_SEEKING">Ищу работу</option>
                                <option value="JOB_OFFERING">Предлагаю работу</option>
                            </optgroup>
                            <optgroup label="Тип занятости">
                                <option value="FULL_TIME">Полная занятость</option>
                                <option value="PART_TIME">Частичная занятость</option>
                                <option value="CONTRACT">Контракт</option>
                                <option value="TEMPORARY">Временная работа</option>
                                <option value="INTERNSHIP">Стажировка</option>
                                <option value="REMOTE">Удаленная работа</option>
                            </optgroup>
                        `;
                    } else if (category === 'SERVICES') {
                        typeSelect.innerHTML += `
                            <optgroup label="Типы услуг">
                                <option value="SERVICE">Услуга</option>
                                <option value="SALE">Продажа услуг</option>
                                <option value="RENT">Аренда услуг</option>
                            </optgroup>
                        `;
                    } else if (category) {
                        typeSelect.innerHTML += `
                            <optgroup label="Типы объявлений">
                                <option value="SALE">Продажа</option>
                                <option value="BUY">Покупка</option>
                                <option value="RENT">Аренда</option>
                                <option value="EXCHANGE">Обмен</option>
                            </optgroup>
                        `;
                    }
                }
                
                categorySelect.addEventListener('change', updateTypes);
                updateTypes(); // Initialize on load
            }
            
            // Initialize Quill editor
            var quill = new Quill('#description-editor', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'align': [] }],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['link', 'image'],
                        ['clean']
                    ]
                },
                placeholder: 'Введите описание объявления...'
            });
            
            // Set initial content if editing
            var hiddenTextarea = document.getElementById('description-hidden');
            if (hiddenTextarea.value) {
                quill.root.innerHTML = hiddenTextarea.value;
            }
            
            // Update hidden textarea on text change
            quill.on('text-change', function() {
                hiddenTextarea.value = quill.root.innerHTML;
            });
            
            // Image preview
            const imageInput = document.getElementById('imageInput');
            const imagePreview = document.getElementById('imagePreview');
            
            imageInput.addEventListener('change', function(e) {
                imagePreview.innerHTML = '';
                const files = e.target.files;
                for (let i = 0; i < Math.min(files.length, 10); i++) {
                    const file = files[i];
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            const img = document.createElement('img');
                            img.src = e.target.result;
                            img.style.width = '100px';
                            img.style.height = '100px';
                            img.style.objectFit = 'cover';
                            img.style.borderRadius = '8px';
                            img.className = 'border';
                            imagePreview.appendChild(img);
                        };
                        reader.readAsDataURL(file);
                    }
                }
            });
            
            // Submit form
            document.querySelector('form').addEventListener('submit', function(e) {
                hiddenTextarea.value = quill.root.innerHTML;
                // Устанавливаем premium в зависимости от выбранных дней
                const premiumDays = document.getElementById('premiumDays').value;
                if (premiumDays && premiumDays > 0) {
                    // Создаем скрытое поле для premium
                    let premiumInput = document.querySelector('input[name="premium"]');
                    if (!premiumInput) {
                        premiumInput = document.createElement('input');
                        premiumInput.type = 'hidden';
                        premiumInput.name = 'premium';
                        premiumInput.value = 'true';
                        document.querySelector('form').appendChild(premiumInput);
                    }
                }
            });
        });
    </script>
</body>
</html>
