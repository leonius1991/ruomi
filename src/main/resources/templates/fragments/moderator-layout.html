<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="moderator-layout(title, content)">
        <!DOCTYPE html>
        <html lang="ru" xmlns:th="http://www.thymeleaf.org">
        <head>
            <th:block th:replace="~{fragments/head-common :: viewport}"></th:block>
            <title th:text="${title}">Модерация — ruomi.fi</title>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
            <link rel="stylesheet" th:href="@{/css/style.css}">
            <link rel="stylesheet" th:href="@{/css/admin-theme.css}">
        </head>
        <body class="admin-page">
            <div th:replace="~{fragments/navbar :: nav}"></div>
            <div class="admin-shell container-fluid px-0">
                <aside class="admin-sidebar">
                    <nav class="nav flex-column">
                        <a class="nav-link" href="/moderator/dashboard">
                            <i class="fas fa-shield-alt"></i><span>Модерация</span>
                        </a>
                        <a class="nav-link" href="/moderator/analytics">
                            <i class="fas fa-chart-bar"></i><span>Аналитика поиска</span>
                        </a>
                        <a class="nav-link" href="/admin/dashboard">
                            <i class="fas fa-cog"></i><span>Админ панель</span>
                        </a>
                        <a class="nav-link" href="/">
                            <i class="fas fa-external-link-alt"></i><span>На сайт</span>
                        </a>
                    </nav>
                </aside>
                <main class="admin-content">
                    <div th:replace="${content}"></div>
                </main>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
            <script>
                (function() {
                    const p = window.location.pathname;
                    document.querySelectorAll('.admin-sidebar .nav-link').forEach(link => {
                        const href = link.getAttribute('href');
                        if (p === href || (href !== '/' && p.startsWith(href))) link.classList.add('active');
                    });
                })();
            </script>
        </body>
        </html>
    </div>
</body>
</html>
