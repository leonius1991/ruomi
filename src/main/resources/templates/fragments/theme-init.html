<script th:fragment="head-init">
(function(){
  try {
    var t = localStorage.getItem('ruomi-theme');
    if (t === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      if (!t) localStorage.setItem('ruomi-theme', 'dark');
    }
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
