<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="admin-layout(title, content)">
        <!DOCTYPE html>
        <html lang="ru" xmlns:th="http://www.thymeleaf.org">
        <head>
            <th:block th:replace="~{fragments/head-common :: viewport}"></th:block>
            <title th:text="${title}">Админ панель - ruomi.fi</title>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
            <link rel="stylesheet" th:href="@{/css/style.css}">
            <link rel="stylesheet" th:href="@{/css/admin-theme.css}">
        </head>
        <body class="admin-page">
            <div th:replace="~{fragments/navbar :: nav}"></div>

            <div class="admin-shell container-fluid px-0">
                <aside class="admin-sidebar">
                    <nav class="nav flex-column">
                        <a class="nav-link" href="/admin/dashboard">
                            <i class="fas fa-tachometer-alt"></i><span>Главная</span>
                        </a>
                        <a class="nav-link" href="/admin/users">
                            <i class="fas fa-users"></i><span>Пользователи</span>
                        </a>
                        <a class="nav-link" href="/admin/categories">
                            <i class="fas fa-list"></i><span>Категории</span>
                        </a>
                        <a class="nav-link" href="/admin/news">
                            <i class="fas fa-newspaper"></i><span>Новости</span>
                        </a>
                        <a class="nav-link" href="/admin/banners">
                            <i class="fas fa-image"></i><span>Баннеры</span>
                        </a>
                        <a class="nav-link" href="/admin/broadcasts">
                            <i class="fas fa-bullhorn"></i><span>Рассылки</span>
                        </a>
                        <a class="nav-link" href="/admin/premium-pricing">
                            <i class="fas fa-euro-sign"></i><span>Премиум цены</span>
                        </a>
                        <a class="nav-link" href="/admin/seo">
                            <i class="fas fa-search"></i><span>SEO</span>
                        </a>
                        <a class="nav-link" href="/admin/theme">
                            <i class="fas fa-palette"></i><span>Тема</span>
                        </a>
                        <a class="nav-link" href="/admin/updates">
                            <i class="fas fa-sync-alt"></i><span>Обновления</span>
                        </a>
                        <a class="nav-link" href="/admin/email-test">
                            <i class="fas fa-envelope"></i><span>Тест почты</span>
                        </a>
                        <a class="nav-link" href="/admin/logs">
                            <i class="fas fa-file-alt"></i><span>Логи</span>
                        </a>
                        <a class="nav-link" href="/moderator/dashboard">
                            <i class="fas fa-shield-alt"></i><span>Модерация</span>
                        </a>
                    </nav>
                </aside>

                <main class="admin-content">
                    <div th:replace="${content}"></div>
                </main>
            </div>

            <div th:replace="~{fragments/site-footer :: site-footer}"></div>

            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
            <script>
                (function() {
                    const currentPath = window.location.pathname;
                    document.querySelectorAll('.admin-sidebar .nav-link').forEach(link => {
                        const href = link.getAttribute('href');
                        if (currentPath === href || (href !== '/' && currentPath.startsWith(href))) {
                            link.classList.add('active');
                        }
                    });
                })();
            </script>
        </body>
        </html>
    </div>
</body>
</html>
