<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение аккаунта - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Dynamic Theme CSS -->
    <link rel="stylesheet" th:href="@{/theme/css}">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <div class="mb-3">
                                <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
                            </div>
                            <h2 class="text-success mb-3">Аккаунт подтвержден!</h2>
                        </div>
                        
                        <div th:if="${message}" class="alert alert-info" role="alert">
                            <i class="fas fa-info-circle me-2"></i>
                            <span th:text="${message}">Сообщение</span>
                        </div>
                        
                        <div class="text-center mt-4">
                            <p class="text-muted mb-3" th:if="${username}">
                                Ваше имя пользователя: <strong th:text="${username}">username</strong>
                            </p>
                            <a th:href="@{/login}" class="btn btn-primary btn-lg">
                                <i class="fas fa-sign-in-alt me-2"></i>Войти в систему
                            </a>
                        </div>
                        
                        <div class="text-center mt-4">
                            <a th:href="@{/}" class="text-muted text-decoration-none">
                                <i class="fas fa-arrow-left me-1"></i>Вернуться на главную
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
