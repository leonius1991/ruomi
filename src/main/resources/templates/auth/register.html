<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head-common :: viewport}"></th:block>
    <title>Регистрация — ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/auth-pages.css}">
    <link rel="stylesheet" th:href="@{/theme/css}">
</head>
<body class="auth-page">
    <div class="container" style="max-width:560px;">
        <div class="auth-card">
            <div class="auth-card-body">
                <div class="auth-brand">
                    <a href="/" class="brand-pill d-inline-flex text-decoration-none">
                        <span>Ruomi</span><i class="fas fa-heart heart"></i>
                    </a>
                    <p class="auth-subtitle">Создание нового аккаунта</p>
                </div>

                <form class="auth-form" th:action="@{/register}" th:object="${userDto}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="firstName" class="form-label">Имя *</label>
                            <input type="text" class="form-control" id="firstName" th:field="*{firstName}" required>
                            <div th:if="${#fields.hasErrors('firstName')}" class="text-danger small mt-1">
                                <span th:errors="*{firstName}">Ошибка</span>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="lastName" class="form-label">Фамилия *</label>
                            <input type="text" class="form-control" id="lastName" th:field="*{lastName}" required>
                            <div th:if="${#fields.hasErrors('lastName')}" class="text-danger small mt-1">
                                <span th:errors="*{lastName}">Ошибка</span>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="username" class="form-label">Имя пользователя *</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="username" th:field="*{username}" required>
                        </div>
                        <div th:if="${#fields.hasErrors('username')}" class="text-danger small mt-1">
                            <span th:errors="*{username}">Ошибка</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email *</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control" id="email" th:field="*{email}" required>
                        </div>
                        <div th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1">
                            <span th:errors="*{email}">Ошибка</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Телефон</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-phone"></i></span>
                            <input type="tel" class="form-control" id="phone" th:field="*{phone}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль *</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" th:field="*{password}" required>
                        </div>
                        <div th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1">
                            <span th:errors="*{password}">Ошибка</span>
                        </div>
                        <small class="text-muted">Минимум 6 символов</small>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="terms" required>
                        <label class="form-check-label" for="terms">
                            Я согласен с <a href="/terms" target="_blank">условиями</a> и
                            <a href="/privacy" target="_blank">политикой конфиденциальности</a>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-coral w-100 mb-2">
                        <i class="fas fa-user-plus me-2"></i>Зарегистрироваться
                    </button>
                </form>

                <div class="auth-footer-links">
                    <a href="/login"><i class="fas fa-sign-in-alt me-1"></i>Уже есть аккаунт — войти</a>
                    <div class="mt-3">
                        <a href="/"><i class="fas fa-arrow-left me-1"></i>На главную</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
