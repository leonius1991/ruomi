<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Dynamic Theme CSS -->
    <link rel="stylesheet" th:href="@{/theme/css}">
    <script>(function(){try{if(localStorage.getItem('ruomi-theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');}}catch(e){}})();</script>
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow" style="border-radius:18px;">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <a href="/" class="brand-pill d-inline-flex text-decoration-none mb-3">
                                <span>Ruomi</span><i class="fas fa-heart heart"></i>
                            </a>
                            <p class="text-muted mb-0">Вход в систему</p>
                        </div>
                        
                        <div th:if="${error}" class="alert alert-danger" role="alert">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            <span th:text="${error}">Ошибка</span>
                        </div>
                        
                        <div th:if="${message}" class="alert alert-success" role="alert">
                            <i class="fas fa-check-circle me-2"></i>
                            <span th:text="${message}">Сообщение</span>
                            <div class="mt-3" th:if="${message != null and #strings.contains(message, 'email')}">
                                <button type="button" class="btn btn-sm btn-outline-primary" id="resendVerificationBtn" 
                                        th:onclick="'resendVerification(\'' + (${registeredEmail} != null ? ${registeredEmail} : '') + '\')'">
                                    <i class="fas fa-paper-plane me-1"></i>Отправить снова
                                </button>
                                <small class="d-block text-muted mt-2" id="resendTimer" style="display: none;"></small>
                            </div>
                            <div class="mt-2" th:if="${message != null and #strings.contains(message, 'email')}">
                                <small class="text-muted">
                                    <i class="fas fa-info-circle me-1"></i><strong>⚠️ Важно:</strong> Если письмо не пришло, проверьте папку <strong>Спам</strong>.
                                </small>
                            </div>
                        </div>
                        
                        <!-- Telegram Login Widget -->
                        <div class="text-center mb-4">
                            <p class="text-muted small mb-2">Войти одним кликом через Telegram</p>
                            <div id="telegram-login-widget"></div>
                        </div>
                        
                        <div class="text-center mb-3">
                            <span class="text-muted">или</span>
                        </div>
                        
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Имя пользователя</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-user"></i>
                                    </span>
                                    <input type="text" class="form-control" id="username" name="username" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">Пароль</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-lock"></i>
                                    </span>
                                    <input type="password" class="form-control" id="password" name="password" required>
                                </div>
                            </div>
                            
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                                <label class="form-check-label" for="remember-me">
                                    Запомнить меня
                                </label>
                            </div>
                            
                            <button type="submit" class="btn btn-coral w-100 mb-3">
                                <i class="fas fa-sign-in-alt me-2"></i>Войти
                            </button>
                        </form>
                        
                        <div class="text-center">
                            <a href="/forgot-password" class="text-decoration-none">Забыли пароль?</a>
                        </div>
                        
                        <hr class="my-4">
                        
                        <div class="text-center">
                            <p class="text-muted mb-0">Нет аккаунта?</p>
                            <a href="/register" class="btn btn-outline-primary mt-2">
                                <i class="fas fa-user-plus me-2"></i>Зарегистрироваться
                            </a>
                        </div>
                        
                        <div class="text-center mt-4">
                            <a href="/" class="text-decoration-none">
                                <i class="fas fa-arrow-left me-2"></i>Вернуться на главную
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Telegram Login Widget Script -->
    <script th:inline="javascript">
        // Устанавливаем атрибуты для Telegram виджета после загрузки DOM
        document.addEventListener('DOMContentLoaded', function() {
            var botUsername = /*[[${@environment.getProperty('telegram.login.widget.bot.username','ruomi_fi_bot')}]]*/ 'ruomi_fi_bot';
            var authUrl = /*[[${@environment.getProperty('telegram.login.widget.auth-url','https://ruomi.fi/auth/telegram/callback')}]]*/ 'https://ruomi.fi/auth/telegram/callback';
            
            var widgetContainer = document.getElementById('telegram-login-widget');
            if (!widgetContainer) {
                console.error('Telegram widget container not found');
                return;
            }
            
            var script = document.createElement('script');
            script.async = true;
            script.src = 'https://telegram.org/js/telegram-widget.js?22';
            script.setAttribute('data-telegram-login', botUsername);
            script.setAttribute('data-auth-url', authUrl);
            script.setAttribute('data-size', 'large');
            script.setAttribute('data-request-access', 'write');
            script.setAttribute('data-onauth', 'onTelegramAuth(user)');
            
            widgetContainer.appendChild(script);
            console.log('Telegram widget script loaded with bot:', botUsername, 'auth-url:', authUrl);
        });
    </script>
    
    <script>
        let resendTimer = null;
        let resendCountdown = 30;
        
        function resendVerification(email) {
            // Если email не передан, запрашиваем его
            if (!email || email.trim() === '') {
                email = prompt('Введите ваш email:');
                if (!email) return;
            }
            
            const btn = document.getElementById('resendVerificationBtn');
            const timerEl = document.getElementById('resendTimer');
            
            btn.disabled = true;
            
            // Используем абсолютный URL с HTTPS для избежания Mixed Content
            const url = window.location.protocol === 'https:' 
                ? 'https://' + window.location.host + '/resend-verification'
                : '/resend-verification';
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'email=' + encodeURIComponent(email)
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    alert('Письмо отправлено! Проверьте ваш email и папку Спам.');
                    resendCountdown = 30;
                    timerEl.style.display = 'block';
                    updateTimer();
                } else {
                    alert('Ошибка: ' + (data.error || 'Не удалось отправить письмо'));
                    btn.disabled = false;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Произошла ошибка при отправке письма. Попробуйте позже.');
                btn.disabled = false;
            });
        }
        
        function updateTimer() {
            const timerEl = document.getElementById('resendTimer');
            const btn = document.getElementById('resendVerificationBtn');
            
            if (resendCountdown > 0) {
                timerEl.textContent = 'Повторная отправка доступна через ' + resendCountdown + ' сек.';
                resendCountdown--;
                resendTimer = setTimeout(updateTimer, 1000);
            } else {
                timerEl.style.display = 'none';
                btn.disabled = false;
            }
        }
        
        // Handle Telegram login callback
        function onTelegramAuth(user) {
            console.log('Telegram auth success:', user);
            
            // Send the user data to our backend
            fetch('/auth/telegram/callback', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(user)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    if (data.action === 'login') {
                        window.location.href = '/';
                    } else if (data.action === 'register') {
                        // Показываем модальное окно с паролем и возможностью установить свой
                        showPasswordSetupModal(data.temporaryPassword, data.user);
                    } else if (data.action === 'link') {
                        alert('Ваш аккаунт автоматически связан с Telegram. Добро пожаловать!');
                        window.location.href = '/';
                    }
                } else {
                    alert('Ошибка: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Произошла ошибка при авторизации через Telegram');
            });
        }
        
        // Показ модального окна для установки пароля
        function showPasswordSetupModal(temporaryPassword, user) {
            const modal = document.createElement('div');
            modal.className = 'modal fade show';
            modal.style.display = 'block';
            modal.style.backgroundColor = 'rgba(0,0,0,0.5)';
            modal.setAttribute('tabindex', '-1');
            modal.innerHTML = `
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Регистрация успешна!</h5>
                            <button type="button" class="btn-close" onclick="this.closest('.modal').remove()"></button>
                        </div>
                        <div class="modal-body">
                            <p>Добро пожаловать на ruomi.fi!</p>
                            <div class="alert alert-info">
                                <strong>Ваш временный пароль:</strong><br>
                                <code id="temp-password" style="font-size: 1.2em; font-weight: bold; letter-spacing: 2px;">${temporaryPassword}</code>
                                <button class="btn btn-sm btn-outline-secondary ms-2" onclick="copyPassword('${temporaryPassword}')">
                                    <i class="fas fa-copy"></i> Копировать
                                </button>
                            </div>
                            <p class="text-muted small">
                                <i class="fas fa-info-circle me-1"></i>
                                Сохраните этот пароль! Он понадобится для входа через обычную форму.<br>
                                Вы также можете установить свой пароль ниже.
                            </p>
                            <hr>
                            <h6>Установить свой пароль (опционально):</h6>
                            <form id="set-password-form" onsubmit="setPassword(event)">
                                <div class="mb-3">
                                    <label for="new-password" class="form-label">Новый пароль</label>
                                    <input type="password" class="form-control" id="new-password" 
                                           minlength="6" required placeholder="Минимум 6 символов">
                                </div>
                                <div class="mb-3">
                                    <label for="confirm-password" class="form-label">Подтвердите пароль</label>
                                    <input type="password" class="form-control" id="confirm-password" 
                                           minlength="6" required placeholder="Повторите пароль">
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-key me-2"></i>Установить пароль
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" onclick="skipPasswordSetup()">
                                        Пропустить (можно установить позже в профиле)
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function copyPassword(password) {
            navigator.clipboard.writeText(password).then(() => {
                alert('Пароль скопирован в буфер обмена!');
            }).catch(() => {
                // Fallback для старых браузеров
                const textarea = document.createElement('textarea');
                textarea.value = password;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('Пароль скопирован!');
            });
        }
        
        function setPassword(event) {
            event.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (newPassword !== confirmPassword) {
                alert('Пароли не совпадают!');
                return;
            }
            
            if (newPassword.length < 6) {
                alert('Пароль должен содержать минимум 6 символов!');
                return;
            }
            
            const setPasswordUrl = window.location.protocol === 'https:' 
                ? 'https://' + window.location.host + '/auth/set-password'
                : '/auth/set-password';
            
            fetch(setPasswordUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    password: newPassword
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Пароль успешно установлен!');
                    document.querySelector('.modal').remove();
                    window.location.href = '/';
                } else {
                    alert('Ошибка: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Произошла ошибка при установке пароля');
            });
        }
        
        function skipPasswordSetup() {
            document.querySelector('.modal').remove();
            window.location.href = '/';
        }
        
    </script>
</body>
</html>
