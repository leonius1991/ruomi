<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head-common :: viewport}"></th:block>
    <title>Вход — ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/auth-pages.css}">
    <link rel="stylesheet" th:href="@{/theme/css}">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body class="auth-page">
    <div class="container auth-shell">
        <div class="auth-card">
            <div class="auth-card-body">
                <div class="auth-brand">
                    <a href="/" class="brand-pill d-inline-flex text-decoration-none">
                        <span>Ruomi</span><i class="fas fa-heart heart"></i>
                    </a>
                    <p class="auth-subtitle">Вход в аккаунт</p>
                </div>

                <div th:if="${error}" class="alert alert-danger py-2 px-3" role="alert" style="font-size:0.88rem;border-radius:12px;">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <span th:text="${error}">Ошибка</span>
                </div>

                <div th:if="${message}" class="alert alert-success py-2 px-3" role="alert" style="font-size:0.88rem;border-radius:12px;">
                    <i class="fas fa-check-circle me-2"></i>
                    <span th:text="${message}">Сообщение</span>
                    <div class="mt-2" th:if="${message != null and #strings.contains(message, 'email')}">
                        <button type="button" class="btn btn-sm btn-outline-teal" id="resendVerificationBtn"
                                th:onclick="'resendVerification(\'' + (${registeredEmail} != null ? ${registeredEmail} : '') + '\')'">
                            <i class="fas fa-paper-plane me-1"></i>Отправить снова
                        </button>
                        <small class="d-block text-muted mt-2" id="resendTimer" style="display:none;"></small>
                    </div>
                </div>

                <div class="auth-telegram-block mb-3">
                    <p class="mb-2"><i class="fab fa-telegram me-1"></i> Войти одним кликом через Telegram</p>
                    <div id="telegram-login-widget" class="d-flex justify-content-center"></div>
                </div>

                <div class="auth-divider">или</div>

                <form class="auth-form" th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="mb-3">
                        <label for="username" class="form-label">Имя пользователя</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required autocomplete="username">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                        <label class="form-check-label" for="remember-me">Запомнить меня</label>
                    </div>
                    <button type="submit" class="btn btn-coral w-100 mb-2">
                        <i class="fas fa-sign-in-alt me-2"></i>Войти
                    </button>
                </form>

                <div class="auth-footer-links">
                    <a href="/forgot-password">Забыли пароль?</a>
                    <span class="mx-2 text-muted">·</span>
                    <a href="/register">Регистрация</a>
                    <div class="mt-3">
                        <a href="/"><i class="fas fa-arrow-left me-1"></i>На главную</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/ruomi-modal.js}"></script>

    <script th:inline="javascript">
        const BOT_USERNAME = /*[[${@environment.getProperty('telegram.login.widget.bot.username','ruomi_fi_bot')}]]*/ 'ruomi_fi_bot';
        const CSRF_TOKEN = document.querySelector('meta[name="_csrf"]')?.content || '';
        const REDIRECT_URL = new URLSearchParams(window.location.search).get('redirect') || '/';

        document.addEventListener('DOMContentLoaded', function() {
            const widgetContainer = document.getElementById('telegram-login-widget');
            if (!widgetContainer) return;
            const script = document.createElement('script');
            script.async = true;
            script.src = 'https://telegram.org/js/telegram-widget.js?22';
            script.setAttribute('data-telegram-login', BOT_USERNAME);
            script.setAttribute('data-size', 'large');
            script.setAttribute('data-request-access', 'write');
            script.setAttribute('data-onauth', 'onTelegramAuth(user)');
            widgetContainer.appendChild(script);
        });

        function getRedirectUrl() {
            const r = new URLSearchParams(window.location.search).get('redirect');
            if (r && r.startsWith('/') && !r.startsWith('//')) return r;
            return '/';
        }

        function onTelegramAuth(user) {
            fetch('/auth/telegram/callback', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(user)
            })
            .then(async response => {
                const data = await response.json().catch(() => ({}));
                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'Ошибка авторизации');
                }
                return data;
            })
            .then(data => {
                if (data.action === 'register') {
                    showPasswordSetupModal(data.temporaryPassword);
                } else {
                    window.location.href = getRedirectUrl();
                }
            })
            .catch(error => {
                RuomiModal.alert('Ошибка входа', error.message || 'Не удалось войти через Telegram');
            });
        }

        function showPasswordSetupModal(temporaryPassword) {
            RuomiModal.show({
                title: 'Добро пожаловать!',
                body: `
                    <p class="mb-2">Аккаунт создан. Вы уже вошли в систему.</p>
                    <div class="alert alert-info py-2 px-3" style="font-size:0.88rem;border-radius:10px;">
                        <strong>Временный пароль:</strong>
                        <code class="ms-1" style="font-size:1rem;">${temporaryPassword}</code>
                        <button type="button" class="btn btn-sm btn-outline-teal ms-2" id="copy-temp-pw">Копировать</button>
                    </div>
                    <p class="text-muted small mb-0">Можно установить свой пароль сейчас или позже в профиле.</p>
                    <hr>
                    <form id="set-password-form">
                        <div class="mb-2">
                            <label class="form-label small">Новый пароль</label>
                            <input type="password" class="form-control form-control-sm" id="new-password" minlength="6" placeholder="Минимум 6 символов">
                        </div>
                        <div class="mb-2">
                            <label class="form-label small">Подтверждение</label>
                            <input type="password" class="form-control form-control-sm" id="confirm-password" minlength="6">
                        </div>
                    </form>`,
                buttons: [
                    { label: 'Пропустить', className: 'btn-outline-teal', onClick: close => { close(); window.location.href = getRedirectUrl(); } },
                    { label: 'Сохранить пароль', className: 'btn-coral', onClick: close => setPassword(close) }
                ]
            });
            document.getElementById('copy-temp-pw')?.addEventListener('click', () => {
                navigator.clipboard.writeText(temporaryPassword).then(() => RuomiModal.alert('Готово', 'Пароль скопирован'));
            });
        }

        function setPassword(closeModal) {
            const newPassword = document.getElementById('new-password')?.value;
            const confirmPassword = document.getElementById('confirm-password')?.value;
            if (!newPassword || newPassword.length < 6) {
                RuomiModal.alert('Ошибка', 'Пароль — минимум 6 символов');
                return;
            }
            if (newPassword !== confirmPassword) {
                RuomiModal.alert('Ошибка', 'Пароли не совпадают');
                return;
            }
            fetch('/auth/set-password', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: newPassword })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    closeModal();
                    window.location.href = getRedirectUrl();
                } else {
                    RuomiModal.alert('Ошибка', data.error || 'Не удалось сохранить пароль');
                }
            })
            .catch(() => RuomiModal.alert('Ошибка', 'Не удалось сохранить пароль'));
        }

        let resendCountdown = 30;
        function resendVerification(email) {
            if (!email || !email.trim()) {
                email = prompt('Введите email:');
                if (!email) return;
            }
            const btn = document.getElementById('resendVerificationBtn');
            btn.disabled = true;
            fetch('/resend-verification', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email)
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    RuomiModal.alert('Отправлено', 'Проверьте почту и папку «Спам».');
                    resendCountdown = 30;
                    updateTimer();
                } else {
                    RuomiModal.alert('Ошибка', data.error || 'Не удалось отправить');
                    btn.disabled = false;
                }
            })
            .catch(() => { btn.disabled = false; });
        }

        function updateTimer() {
            const timerEl = document.getElementById('resendTimer');
            const btn = document.getElementById('resendVerificationBtn');
            if (resendCountdown > 0) {
                timerEl.style.display = 'block';
                timerEl.textContent = 'Повтор через ' + resendCountdown + ' сек.';
                resendCountdown--;
                setTimeout(updateTimer, 1000);
            } else {
                timerEl.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
