<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка подтверждения - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Dynamic Theme CSS -->
    <link rel="stylesheet" th:href="@{/theme/css}">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <div class="mb-3">
                                <i class="fas fa-exclamation-triangle text-warning" style="font-size: 4rem;"></i>
                            </div>
                            <h2 class="text-warning mb-3">Ошибка подтверждения</h2>
                        </div>
                        
                        <div th:if="${error}" class="alert alert-danger" role="alert">
                            <i class="fas fa-exclamation-circle me-2"></i>
                            <span th:text="${error}">Ошибка</span>
                        </div>
                        
                        <div class="alert alert-info mt-3" role="alert">
                            <h5 class="alert-heading">
                                <i class="fas fa-info-circle me-2"></i>Что делать?
                            </h5>
                            <ul class="mb-0">
                                <li>Ссылка для подтверждения могла истечь (действительна 24 часа)</li>
                                <li>Ссылка могла быть уже использована</li>
                                <li>Попробуйте запросить новое письмо для подтверждения</li>
                            </ul>
                        </div>
                        
                        <div class="text-center mt-4">
                            <a th:href="@{/login}" class="btn btn-primary btn-lg me-2">
                                <i class="fas fa-sign-in-alt me-2"></i>Перейти на страницу входа
                            </a>
                        </div>
                        
                        <div class="text-center mt-3">
                            <a th:href="@{/register}" class="text-muted text-decoration-none">
                                <i class="fas fa-user-plus me-1"></i>Зарегистрироваться заново
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
