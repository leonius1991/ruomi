<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/head-common :: viewport}"></th:block>
    <title>Редактировать объявление - ruomi.fi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/theme/css}">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <div th:replace="~{fragments/navbar :: nav}"></div>

    <div class="container my-5">
        <h2 class="mb-4"><i class="fas fa-edit me-2"></i>Редактировать объявление</h2>
        
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div class="row">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form th:action="@{/edit-advertisement/{id}(id=${advertisementDto.id})}" th:object="${advertisementDto}" method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label class="form-label">Заголовок <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{title}" required>
                                <div th:if="${#fields.hasErrors('title')}" class="text-danger">
                                    <span th:errors="*{title}"></span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Описание <span class="text-danger">*</span></label>
                                <div id="description-editor" style="min-height: 200px;" th:utext="${advertisementDto.description}"></div>
                                <textarea id="description-hidden" name="description" th:field="*{description}" style="display:none;" required></textarea>
                                <div th:if="${#fields.hasErrors('description')}" class="text-danger">
                                    <span th:errors="*{description}"></span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Текущие фотографии</label>
                                <div class="d-flex flex-wrap gap-2 mb-2" th:if="${images != null}">
                                    <div th:each="img : ${images}" class="position-relative">
                                        <img th:src="@{/files/{fileName}(fileName=${img.fileName})}" 
                                             style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px;" 
                                             class="border">
                                    </div>
                                </div>
                                <label class="form-label">Добавить новые фотографии (максимум 10)</label>
                                <input type="file" class="form-control" name="images" multiple accept="image/*" id="imageInput">
                                <div id="imagePreview" class="mt-3 d-flex flex-wrap gap-2"></div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Категория <span class="text-danger">*</span></label>
                                    <select class="form-select" th:field="*{category}" required id="categorySelect">
                                        <option value="">Выберите категорию</option>
                                        <!-- Для сущностей Category из БД -->
                                        <option th:each="cat : ${categories}" 
                                                th:value="${cat.name}" 
                                                th:text="${cat.displayName}">
                                        </option>
                                    </select>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Подкатегория</label>
                                    <select class="form-select" id="subcategorySelect" name="subcategoryId">
                                        <option value="">Выберите подкатегорию (необязательно)</option>
                                    </select>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Тип объявления</label>
                                    <select class="form-select" th:field="*{type}">
                                        <option th:each="type : ${types}" 
                                                th:value="${type.name()}" 
                                                th:text="${type.getDisplayName()}">
                                        </option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Цена (€)</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{price}" min="0">
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Город</label>
                                    <div class="autocomplete">
                                        <input type="text" id="cityInput" class="form-control" th:field="*{city}" placeholder="Начните вводить название города...">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Адрес/Местоположение</label>
                                <input type="text" class="form-control" th:field="*{location}">
                            </div>
                            
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" th:field="*{urgent}">
                                    <label class="form-check-label">
                                        Срочное объявление
                                    </label>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/my-advertisements" class="btn btn-secondary">Отмена</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i>Сохранить изменения
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/cities-autocomplete.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Инициализация автокомплита городов
            const cityInput = document.getElementById('city') || document.querySelector('input[name="city"]');
            if (cityInput && typeof initCityAutocomplete === 'function') {
                initCityAutocomplete(cityInput.id || 'city');
            }
            
            // Загрузка подкатегорий при выборе категории
            const categorySelect = document.getElementById('categorySelect');
            const subcategorySelect = document.getElementById('subcategorySelect');
            const currentSubcategoryId = /*[[${advertisementDto.subcategoryId}]]*/ null;
            
            async function loadSubcategories(categoryName) {
                if (!categoryName || !subcategorySelect) {
                    if (subcategorySelect) {
                        subcategorySelect.innerHTML = '<option value="">Выберите подкатегорию (необязательно)</option>';
                    }
                    return;
                }
                
                try {
                    // Находим категорию по name и получаем её id
                    const categoriesResponse = await fetch('/api/categories');
                    const categories = await categoriesResponse.json();
                    const category = categories.find(cat => cat.name === categoryName);
                    
                    if (!category) {
                        subcategorySelect.innerHTML = '<option value="">Выберите подкатегорию (необязательно)</option>';
                        return;
                    }
                    
                    const subcategoriesResponse = await fetch('/admin/categories/subcategories/' + category.id);
                    const subcategories = await subcategoriesResponse.json();
                    
                    subcategorySelect.innerHTML = '<option value="">Выберите подкатегорию (необязательно)</option>';
                    subcategories.forEach(subcat => {
                        const option = document.createElement('option');
                        option.value = subcat.id;
                        option.textContent = subcat.displayName;
                        if (currentSubcategoryId && subcat.id === currentSubcategoryId) {
                            option.selected = true;
                        }
                        subcategorySelect.appendChild(option);
                    });
                } catch (error) {
                    console.error('Error loading subcategories:', error);
                    if (subcategorySelect) {
                        subcategorySelect.innerHTML = '<option value="">Ошибка загрузки подкатегорий</option>';
                    }
                }
            }
            
            if (categorySelect) {
                // Загружаем подкатегории для текущей категории
                const currentCategory = categorySelect.value;
                if (currentCategory) {
                    loadSubcategories(currentCategory);
                }
                
                // Загружаем подкатегории при изменении категории
                categorySelect.addEventListener('change', function() {
                    loadSubcategories(this.value);
                });
            }
            
            var quill = new Quill('#description-editor', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'align': [] }],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['link', 'image'],
                        ['clean']
                    ]
                }
            });
            
            var hiddenTextarea = document.getElementById('description-hidden');
            quill.on('text-change', function() {
                hiddenTextarea.value = quill.root.innerHTML;
            });
            
            const imageInput = document.getElementById('imageInput');
            const imagePreview = document.getElementById('imagePreview');
            imageInput.addEventListener('change', function(e) {
                imagePreview.innerHTML = '';
                const files = e.target.files;
                for (let i = 0; i < Math.min(files.length, 10); i++) {
                    const file = files[i];
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            const img = document.createElement('img');
                            img.src = e.target.result;
                            img.style.width = '100px';
                            img.style.height = '100px';
                            img.style.objectFit = 'cover';
                            img.style.borderRadius = '8px';
                            img.className = 'border';
                            imagePreview.appendChild(img);
                        };
                        reader.readAsDataURL(file);
                    }
                }
            });
            
            document.querySelector('form').addEventListener('submit', function(e) {
                hiddenTextarea.value = quill.root.innerHTML;
            });
        });
    </script>

    <div th:replace="~{fragments/site-footer :: visit-stats}"></div>
</body>
</html>
