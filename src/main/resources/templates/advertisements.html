<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/head-common :: viewport}"></th:block>
    <title th:text="${pageTitle}">ruomi.fi - Все объявления</title>
    <meta name="description" th:attr="content=${metaDescription}" content="Просмотр всех объявлений на ruomi.fi">
    <meta name="keywords" th:attr="content=${metaKeywords}" content="объявления, vfinke">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Dynamic Theme CSS -->
    <link rel="stylesheet" th:href="@{/theme/css}">
</head>
<body>
    <!-- Navigation -->
    <div th:replace="~{fragments/navbar :: nav}"></div>
    
    <!-- Notification Bar -->
    <div th:replace="~{fragments/notifications :: notification-bar}"></div>

    <!-- Top Banners -->
    <div th:replace="~{fragments/banners :: top-banners}"></div>
    
    <!-- Page Header -->
    <section class="ruomi-page-header py-4">
        <div class="container">
            <h1 class="mb-0">
                <i class="fas fa-list me-2"></i>
                <span th:if="${category != null}" th:text="${'Объявления: ' + category}">Объявления</span>
                <span th:if="${category == null && search != null}" th:text="${'Результаты поиска: ' + search}">Поиск</span>
                <span th:if="${category == null && search == null}">Все объявления</span>
            </h1>
            <p class="mb-0 mt-2 opacity-75" th:if="${totalElements != null}">
                Найдено: <strong th:text="${totalElements}">0</strong>
            </p>
        </div>
    </section>

    <!-- Filters Section -->
    <section class="ruomi-filters-section py-3">
        <div class="container">
            <form method="get" action="/advertisements" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Категория</label>
                    <select name="category" class="form-select">
                        <option value="">Все категории</option>
                        <option th:each="cat : ${categories}" 
                                th:value="${cat.name()}" 
                                th:text="${cat.getDisplayName()}"
                                th:selected="${category == cat.name()}">
                        </option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Город</label>
                    <input type="text" name="city" class="form-control" th:value="${city}" placeholder="Введите город">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Мин. цена (€)</label>
                    <input type="number" name="minPrice" class="form-control" th:value="${minPrice}" placeholder="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Макс. цена (€)</label>
                    <input type="number" name="maxPrice" class="form-control" th:value="${maxPrice}" placeholder="10000">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-filter me-1"></i>Фильтр
                    </button>
                </div>
            </form>
        </div>
    </section>

    <!-- Advertisements List -->
    <section class="py-5">
        <div class="container">
            <div class="row">
                <div class="col-lg-9">
                    <div th:if="${advertisements != null && !advertisements.empty}" class="row g-3 ruomi-ad-grid">
                        <div class="col-lg-4 col-md-6 col-12 col-sm-6 mb-1" th:each="ad : ${advertisements.content}">
                            <div class="ad-card" th:style="${ad.isPremium} ? 'border-color:#F2C14E;' : (${ad.isUrgent} ? 'border-color:#E0573F;' : '')">
                                <a th:href="@{/advertisement/{id}(id=${ad.id})}" class="ad-media d-block">
                                    <img th:if="${ad.images != null and !#lists.isEmpty(ad.images)}"
                                         th:src="@{/files/{fileName}(fileName=${ad.images[0].fileName})}" th:alt="${ad.title}">
                                    <div th:if="${ad.images == null or #lists.isEmpty(ad.images)}" class="ad-noimg">
                                        <i class="fas fa-image"></i>
                                    </div>
                                    <span class="ad-badge position-absolute" th:if="${ad.isPremium}" style="top:0.55rem; left:0.55rem; background:#F2C14E; color:#1F3D35; margin:0;">
                                        <i class="fas fa-star me-1"></i>Премиум
                                    </span>
                                    <span class="ad-badge position-absolute" th:if="${ad.isUrgent and !ad.isPremium}" style="top:0.55rem; left:0.55rem; background:#E0573F; color:#fff; margin:0;">
                                        <i class="fas fa-exclamation-triangle me-1"></i>Срочно
                                    </span>
                                    <span class="price-chip" th:if="${ad.price != null}" th:text="${'€' + ad.price}">€100</span>
                                    <span class="price-chip" th:if="${ad.price == null}">Цена не указана</span>
                                </a>
                                <div class="ad-body">
                                    <span class="ad-badge" th:text="${ad.category.getDisplayName()}">Категория</span>
                                    <a th:href="@{/advertisement/{id}(id=${ad.id})}" class="ad-title text-decoration-none" th:text="${ad.title}">Заголовок</a>
                                    <div class="ad-meta d-flex align-items-center justify-content-between">
                                        <span><i class="fas fa-map-marker-alt me-1"></i><span th:text="${ad.city}">Город</span></span>
                                        <span><i class="fas fa-eye me-1"></i><span th:text="${ad.views}">0</span></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
            
            <div th:if="${advertisements == null || advertisements.empty}" class="text-center py-5">
                <i class="fas fa-inbox fa-4x text-muted mb-3"></i>
                <h3 class="text-muted">Объявления не найдены</h3>
                <p class="text-muted">Попробуйте изменить параметры поиска или фильтры</p>
                <a href="/advertisements" class="btn btn-primary">
                    <i class="fas fa-redo me-1"></i>Сбросить фильтры
                </a>
            </div>

            <!-- Pagination -->
            <nav th:if="${advertisements != null && totalPages > 1}" aria-label="Навигация по страницам">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/advertisements(page=${currentPage - 1}, category=${category}, city=${city}, search=${search}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/advertisements(page=${i}, category=${category}, city=${city}, search=${search}, minPrice=${minPrice}, maxPrice=${maxPrice})}" 
                           th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/advertisements(page=${currentPage + 1}, category=${category}, city=${city}, search=${search}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
                            <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </section>

    <!-- Footer -->
    <div th:replace="~{fragments/site-footer :: site-footer}"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
