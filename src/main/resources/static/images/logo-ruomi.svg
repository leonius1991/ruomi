<svg width="200" height="60" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <linearGradient id="flagGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003580;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#003580;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#003580;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003580;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flagGradientVertical" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003580;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#003580;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#003580;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003580;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновая доска объявлений (стилизованная) -->
  <rect x="5" y="8" width="190" height="44" rx="4" fill="url(#flagGradient)" opacity="0.15"/>
  
  <!-- Крест финского флага (вертикальная полоса) -->
  <rect x="95" y="8" width="10" height="44" rx="2" fill="#003580" opacity="0.3"/>
  
  <!-- Крест финского флага (горизонтальная полоса) -->
  <rect x="5" y="28" width="190" height="4" rx="2" fill="#003580" opacity="0.3"/>
  
  <!-- Тень от слова Suomi (более заметная) -->
  <text x="100" y="45" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600" 
        fill="#003580" text-anchor="middle" opacity="0.4" transform="translate(2, 2)">Suomi</text>
  <text x="100" y="45" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600" 
        fill="#ffffff" text-anchor="middle" opacity="0.3" transform="translate(1, 1)">Suomi</text>
  
  <!-- Основное слово Ruomi -->
  <text x="100" y="45" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" 
        fill="#003580" text-anchor="middle" letter-spacing="1px">Ruomi</text>
  
  <!-- Декоративные элементы - скрепки для объявлений -->
  <circle cx="15" cy="15" r="3" fill="#003580" opacity="0.4"/>
  <circle cx="185" cy="15" r="3" fill="#003580" opacity="0.4"/>
  <circle cx="15" cy="45" r="3" fill="#003580" opacity="0.4"/>
  <circle cx="185" cy="45" r="3" fill="#003580" opacity="0.4"/>
  
  <!-- Подзаголовок .fi -->
  <text x="100" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="400" 
        fill="#003580" text-anchor="middle" opacity="0.6">ruomi.fi</text>
</svg>
